name: i love ai

on:
  schedule:
    - cron: '52 2 * * *'
  workflow_dispatch: # Keeps a manual trigger button in the GitHub UI just in case you want to force an update

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Grants the token permission to commit changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Page Updater Script
        working-directory: ./evil
        run: node update-pages.js 

      - name: Commit and Push Updated Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are actual changes to commit so the pipeline doesn't error out
          if [ -n "$(git status --porcelain)" ]; then
            git add mpd-local-scrobbler.html mpd-rpc-py.html
            git commit -m "chore: auto-update page metrics [skip ci]"
            git push
          else
            echo "No changes detected in any of the pages, skipping commit."
          fi